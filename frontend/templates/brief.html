{% extends "base.html" %}
{% block title %}REMI — Brief: {{ person_name }}{% endblock %}

{% block content %}
<div class="mb-4">
    <a href="/app/people/{{ person_id }}" class="text-sm text-blue-600 hover:text-blue-800">&larr; Back to {{ person_name }}</a>
</div>

<div class="bg-white border border-gray-200 rounded-lg p-6">
    <div class="flex items-center justify-between mb-4">
        <h1 class="text-2xl font-bold">Brief: {{ person_name }}</h1>
        <button
            id="copy-btn"
            class="text-sm bg-gray-100 text-gray-700 px-3 py-1.5 rounded hover:bg-gray-200"
            onclick="copyBrief()"
        >Copy</button>
    </div>

    <div id="brief-text" class="prose prose-sm max-w-none text-gray-700 leading-relaxed whitespace-pre-line">{{ brief }}</div>
</div>
{% endblock %}

{% block scripts %}
<script>
function copyBrief() {
    const text = document.getElementById('brief-text').textContent;
    navigator.clipboard.writeText(text).then(function() {
        const btn = document.getElementById('copy-btn');
        btn.textContent = 'Copied!';
        setTimeout(function() { btn.textContent = 'Copy'; }, 2000);
    });
}
</script>
{% endblock %}
