<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}REMI{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' };
    </script>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script>
        (function() {
            var stored = localStorage.getItem('remi-theme');
            if (stored === 'dark' || (!stored && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
            }
        })();
    </script>
    <style>
        .htmx-indicator { display: none; }
        .htmx-request .htmx-indicator { display: inline-block; }
        .htmx-request.htmx-indicator { display: inline-block; }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 min-h-screen text-gray-900 dark:text-gray-100 transition-colors">
    <nav class="bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 px-4 py-3">
        <div class="max-w-3xl mx-auto flex items-center justify-between">
            <a href="/" class="text-xl font-bold text-gray-900 dark:text-white">REMI</a>
            <div class="flex items-center gap-4 text-sm">
                <a href="/" class="text-gray-600 dark:text-gray-300 hover:text-gray-900 dark:hover:text-white {% if active == 'capture' %}font-semibold text-gray-900 dark:text-white{% endif %}">Capture</a>
                <a href="/app/people" class="text-gray-600 dark:text-gray-300 hover:text-gray-900 dark:hover:text-white {% if active == 'people' %}font-semibold text-gray-900 dark:text-white{% endif %}">People</a>
                <a href="/app/settings" class="text-gray-600 dark:text-gray-300 hover:text-gray-900 dark:hover:text-white {% if active == 'settings' %}font-semibold text-gray-900 dark:text-white{% endif %}">Settings</a>
                <button id="theme-toggle" class="text-gray-500 dark:text-gray-400 hover:text-gray-900 dark:hover:text-white p-1" title="Toggle dark mode">
                    <span id="theme-icon-light" class="hidden dark:inline">&#9788;</span>
                    <span id="theme-icon-dark" class="inline dark:hidden">&#9790;</span>
                </button>
            </div>
        </div>
    </nav>
    <main class="max-w-3xl mx-auto px-4 py-6">
        {% block content %}{% endblock %}
    </main>
    <script>
        document.getElementById('theme-toggle').addEventListener('click', function() {
            var html = document.documentElement;
            var isDark = html.classList.toggle('dark');
            localStorage.setItem('remi-theme', isDark ? 'dark' : 'light');
        });
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
