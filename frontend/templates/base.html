<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}REMI{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <style>
        .htmx-indicator { display: none; }
        .htmx-request .htmx-indicator { display: inline-block; }
        .htmx-request.htmx-indicator { display: inline-block; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <nav class="bg-white border-b border-gray-200 px-4 py-3">
        <div class="max-w-3xl mx-auto flex items-center justify-between">
            <a href="/" class="text-xl font-bold text-gray-900">REMI</a>
            <div class="flex gap-4 text-sm">
                <a href="/" class="text-gray-600 hover:text-gray-900 {% if active == 'capture' %}font-semibold text-gray-900{% endif %}">Capture</a>
                <a href="/app/people" class="text-gray-600 hover:text-gray-900 {% if active == 'people' %}font-semibold text-gray-900{% endif %}">People</a>
                <a href="/app/settings" class="text-gray-600 hover:text-gray-900 {% if active == 'settings' %}font-semibold text-gray-900{% endif %}">Settings</a>
            </div>
        </div>
    </nav>
    <main class="max-w-3xl mx-auto px-4 py-6">
        {% block content %}{% endblock %}
    </main>
    {% block scripts %}{% endblock %}
</body>
</html>
