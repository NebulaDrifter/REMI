{% extends "base.html" %}
{% block title %}REMI — Capture{% endblock %}

{% block content %}
<h1 class="text-2xl font-bold mb-4">Capture</h1>

<form id="capture-form" class="space-y-4">
    <div>
        <label for="raw-input" class="block text-sm font-medium text-gray-700 mb-1">What happened?</label>
        <textarea
            id="raw-input"
            name="raw_input"
            rows="4"
            class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
            placeholder="Water cooler with Jerry, he likes Fall Out Boy and said he'd send me the new album link by Friday."
            required
        ></textarea>
    </div>

    <div class="flex gap-3">
        <button
            type="submit"
            class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-blue-700"
        >Extract</button>

        <button
            type="button"
            id="record-btn"
            class="bg-gray-100 text-gray-700 px-4 py-2 rounded-lg text-sm font-medium hover:bg-gray-200 flex items-center gap-2"
        >
            <span id="record-icon">🎤</span>
            <span id="record-label">Record</span>
        </button>

        <span id="extract-spinner" class="htmx-indicator text-gray-400 text-sm self-center">Extracting...</span>
    </div>
</form>

<div id="extraction-result" class="mt-6 hidden">
    <div class="bg-white border border-gray-200 rounded-lg p-4 space-y-4">
        <h2 class="text-lg font-semibold">Extraction Result</h2>

        <div class="grid grid-cols-2 gap-3 text-sm">
            <div>
                <span class="text-gray-500">Person:</span>
                <span id="result-person" class="font-medium"></span>
            </div>
            <div>
                <span class="text-gray-500">Type:</span>
                <span id="result-type" class="font-medium"></span>
            </div>
        </div>

        <div class="text-sm">
            <span class="text-gray-500">Summary:</span>
            <p id="result-summary" class="mt-1"></p>
        </div>

        <div id="result-facts" class="text-sm"></div>
        <div id="result-tags" class="text-sm"></div>
        <div id="result-loops" class="text-sm"></div>

        <div id="resolution-area" class="border-t pt-3 mt-3"></div>

        <div id="confirm-area" class="hidden">
            <button
                id="confirm-btn"
                class="bg-green-600 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-green-700"
            >Save</button>
            <span id="confirm-spinner" class="htmx-indicator text-gray-400 text-sm ml-2">Saving...</span>
        </div>

        <div id="save-success" class="hidden text-green-600 text-sm font-medium">
            Saved successfully.
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/capture.js"></script>
<script src="/static/js/recorder.js"></script>
{% endblock %}
