{% extends "base.html" %}
{% block title %}REMI — Capture{% endblock %}

{% block content %}
<div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl p-5 shadow-sm">
    <h1 class="text-xl font-bold mb-1">Log an interaction</h1>
    <p class="text-sm text-gray-500 dark:text-gray-400 mb-4">Type a quick note or record a voice memo.</p>

    <form id="capture-form" class="space-y-4">
        <textarea
            id="raw-input"
            name="raw_input"
            rows="3"
            class="w-full border border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 rounded-lg px-3 py-2.5 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 resize-none"
            placeholder="Water cooler with Jerry, he likes Fall Out Boy and said he'd send me the new album link by Friday."
            required
            oninput="this.style.height='auto'; this.style.height = Math.min(this.scrollHeight, 288) + 'px';"
        ></textarea>

        <div class="flex gap-3 items-center">
            <button
                type="submit"
                id="extract-btn"
                class="bg-blue-600 text-white px-5 py-2 rounded-lg text-sm font-medium hover:bg-blue-700 flex items-center gap-2"
            >
                <span id="extract-btn-text">Extract</span>
                <span id="extract-spinner" class="hidden spinner">&#9696;</span>
            </button>

            <button
                type="button"
                id="record-btn"
                class="bg-gray-100 dark:bg-gray-700 text-gray-700 dark:text-gray-300 px-4 py-2 rounded-lg text-sm font-medium hover:bg-gray-200 dark:hover:bg-gray-600 flex items-center gap-2"
            >
                <span id="record-icon">🎤</span>
                <span id="record-label">Record</span>
            </button>
        </div>
    </form>
</div>

<div id="extraction-result" class="mt-5 hidden">
    <div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl p-5 shadow-sm space-y-4">
        <div class="flex items-center justify-between">
            <h2 class="text-lg font-semibold">Extraction Result</h2>
            <button
                id="dismiss-btn"
                class="text-gray-400 dark:text-gray-500 hover:text-gray-600 dark:hover:text-gray-300 text-xl leading-none px-1"
                title="Dismiss"
            >&times;</button>
        </div>

        <div class="grid grid-cols-2 gap-3 text-sm">
            <div>
                <span class="text-gray-500 dark:text-gray-400">Person:</span>
                <span id="result-person" class="font-medium"></span>
            </div>
            <div>
                <span class="text-gray-500 dark:text-gray-400">Type:</span>
                <span id="result-type" class="font-medium"></span>
            </div>
        </div>

        <div class="text-sm">
            <span class="text-gray-500 dark:text-gray-400">Summary:</span>
            <p id="result-summary" class="mt-1"></p>
        </div>

        <div id="result-facts" class="text-sm"></div>
        <div id="result-tags" class="text-sm"></div>
        <div id="result-loops" class="text-sm"></div>

        <div id="resolution-area" class="border-t border-gray-200 dark:border-gray-700 pt-3 mt-3"></div>

        <div id="confirm-area" class="hidden">
            <button
                id="confirm-btn"
                class="bg-green-600 text-white px-5 py-2 rounded-lg text-sm font-medium hover:bg-green-700 flex items-center gap-2"
            >
                <span id="confirm-btn-text">Save</span>
                <span id="confirm-spinner" class="hidden spinner">&#9696;</span>
            </button>
        </div>

        <div id="save-success" class="hidden">
            <div class="flex items-center gap-3 bg-green-50 dark:bg-green-900/30 border border-green-200 dark:border-green-800 rounded-lg px-4 py-3">
                <span class="text-green-600 dark:text-green-400 text-sm font-medium">Saved successfully.</span>
                <a id="save-success-link" href="#" class="text-sm text-blue-600 dark:text-blue-400 hover:underline">View profile &rarr;</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/capture.js"></script>
<script src="/static/js/recorder.js"></script>
{% endblock %}
