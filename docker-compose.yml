# REMI Local Deployment
#
# Default config binds to 127.0.0.1 only. Change with care.
# Ollama service is commented out — uncomment to run local AI.

services:
  remi-app:
    build:
      context: .
      dockerfile: deployments/local/Dockerfile
    # Bind to localhost only by default. Override only if you understand the implications.
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - .env
    environment:
      - REMI_HOST=0.0.0.0
    volumes:
      # Persist SQLite database across restarts
      - ./data:/app/data
      # Persist audio files across restarts
      - ./audio_storage:/app/audio_storage
    restart: unless-stopped
    # Security: drop unnecessary capabilities
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Uncomment to run Ollama for local AI inference.
  # Then set AI_PROVIDER=ollama and OLLAMA_BASE_URL=http://ollama:11434 in .env
  #
  # ollama:
  #   image: ollama/ollama:latest
  #   ports:
  #     - "127.0.0.1:11434:11434"
  #   volumes:
  #     - ./ollama_data:/root/.ollama
  #   restart: unless-stopped
  #   # On Linux with NVIDIA GPU, uncomment:
  #   # deploy:
  #   #   resources:
  #   #     reservations:
  #   #       devices:
  #   #         - driver: nvidia
  #   #           count: 1
  #   #           capabilities: [gpu]

networks:
  default:
    name: remi-network
