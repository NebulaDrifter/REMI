# REMI Local Deployment
#
# Default config binds to 127.0.0.1 only. Change with care.
#
# The ollama service runs local AI inference and is reachable ONLY on the
# internal remi-network — it is NOT published to your host. To use it, set
# AI_PROVIDER=ollama in .env. OLLAMA_BASE_URL is set automatically below — do
# not set it in .env (inside the container, localhost points at REMI itself).
# Manage models from REMI's Settings screen. Models persist in ./ollama_data.
#
# Already run Ollama on your host (with models downloaded)? Skip the bundled
# container and connect to it instead — no second copy of your models:
#   docker compose -f docker-compose.yml -f docker-compose.host-ollama.yml up

services:
  remi-app:
    build:
      context: .
      dockerfile: deployments/local/Dockerfile
    # Bind to localhost only by default. Override only if you understand the implications.
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - .env
    environment:
      - REMI_HOST=0.0.0.0
      # The ollama service is always at this internal address. Set here (not in
      # .env) so it can't be misconfigured to localhost, which inside this
      # container points at the app itself, not Ollama. Overrides .env.
      - OLLAMA_BASE_URL=http://ollama:11434
    volumes:
      # Persist SQLite database across restarts
      - ./data:/app/data
      # Persist audio files across restarts
      - ./audio_storage:/app/audio_storage
    # No `depends_on: ollama` on purpose. REMI connects to Ollama at request
    # time, never at boot, so start order does not matter. Leaving it out also
    # lets the host-ollama override cleanly drop the bundled container.
    restart: unless-stopped
    # Security: drop unnecessary capabilities
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Local AI inference. Internal-only: no host port published, so it is not
  # exposed to your network. REMI reaches it at http://ollama:11434.
  # Manage models from the Settings screen.
  ollama:
    image: ollama/ollama:latest
    # No `ports:` on purpose — internal network access only.
    expose:
      - "11434"
    volumes:
      # Downloaded models persist across restarts
      - ./ollama_data:/root/.ollama
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    # On Linux with an NVIDIA GPU, uncomment for hardware acceleration:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

networks:
  default:
    name: remi-network
